name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Run tests (no GPU, all inference mocked) ──────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # Install only what the tests actually need — not the full ML stack.
      # This keeps CI fast (< 60 s) without needing a GPU runner.
      - name: Install test dependencies
        run: |
          pip install \
            fastapi \
            httpx \
            pytest \
            pytest-asyncio \
            pydantic \
            pillow \
            numpy \
            opencv-python-headless \
            torch --index-url https://download.pytorch.org/whl/cpu \
            transformers

      - name: Install package (editable)
        run: pip install -e . --no-deps

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ── 2. Build Docker image ─────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test   # only build if tests pass

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false          # set to true + add registry secrets to push to GHCR
          tags: gravsense:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test container health endpoint
        run: |
          docker run -d --name gravsense_test -p 8000:8000 gravsense:ci
          sleep 15
          curl --retry 5 --retry-delay 3 --retry-connrefused \
               -f http://localhost:8000/health
          docker stop gravsense_test
