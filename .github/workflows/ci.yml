name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Lint ───────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check gravsense/ tests/

  # ── 2. Run tests (no GPU, all inference mocked) ──────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # Install only what the tests actually need — not the full ML stack.
      # This keeps CI fast (< 60 s) without needing a GPU runner.
      - name: Install test dependencies
        run: |
          pip install \
            fastapi \
            python-multipart \
            httpx \
            pytest \
            pytest-asyncio \
            pydantic \
            pillow \
            numpy \
            opencv-python-headless \
            transformers
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Run tests
        run: PYTHONPATH=. pytest tests/ -v --tb=short

  # ── 3. Build & push Docker image ─────────────────────────────────────────
  docker:
    name: Docker build & push
    runs-on: ubuntu-latest
    needs: [lint, test]   # only build if lint + tests pass
    permissions:
      contents: read
      packages: write     # needed to push to GHCR

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (+ push on main)
        uses: docker/build-push-action@v5
        with:
          context: .
          load: ${{ github.event_name == 'pull_request' }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/gravsense:latest
            ghcr.io/${{ github.repository_owner }}/gravsense:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test container (PRs only — image is loaded locally)
        if: github.event_name == 'pull_request'
        run: |
          docker run -d --name gravsense_test -p 8000:8000 \
            ghcr.io/${{ github.repository_owner }}/gravsense:latest
          sleep 15
          curl --retry 5 --retry-delay 3 --retry-connrefused \
               -f http://localhost:8000/health
          docker stop gravsense_test
