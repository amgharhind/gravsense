services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    image: gravsense:latest
    container_name: gravsense_api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - HF_HOME=/cache/huggingface
    volumes:
      # HuggingFace model cache persists between restarts (models are ~600 MB total).
      # On first startup the API will download models; subsequent starts are instant.
      - hf_cache:/cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 120s  # allow time for model warmup on startup
      retries: 5

volumes:
  hf_cache:
    driver: local
